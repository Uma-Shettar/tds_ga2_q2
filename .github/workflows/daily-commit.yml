name: Daily Auto Commit

permissions:
  contents: write
  pull-requests: write

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true
          fetch-depth: 0

      - name: Update status file by 24f2000817@ds.study.iitm.ac.in
        run: |
          echo "Last updated: $(date -u)" > STATUS.md

      - name: Commit and push changes
        run: |
          git config user.name "DevSync Bot"
          git config user.email "24f2000817@ds.study.iitm.ac.in"
          git add STATUS.md
          git commit -m "Daily update by 24f2000817@ds.study.iitm.ac.in - $(date -u)" || echo "No changes to commit"
          git push
