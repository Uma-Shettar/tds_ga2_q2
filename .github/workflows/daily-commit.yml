name: Daily Auto Commit

on:
  schedule:
    # Runs daily at 3:00 AM UTC (8:30 AM IST) - specific time required
    - cron: '0 3 * * *'
  workflow_dispatch:  # Manual test button

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update status file by 24f2000817@ds.study.iitm.ac.in
        run: |
          echo "Last updated: $(date -u)" > STATUS.md

      - name: Commit and push changes
        run: |
          git config user.name "DevSync Bot"
          git config user.email "24f2000817@ds.study.iitm.ac.in"
          git add STATUS.md
          git commit -m "Daily update by 24f2000817@ds.study.iitm.ac.in - $(date -u)"
          git push
